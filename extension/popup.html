<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 220px;
      padding: 12px;
      font-family: -apple-system, sans-serif;
      font-size: 13px;
      background: #1c1c1e;
      color: #f5f5f7;
      margin: 0;
    }
    h3 { margin: 0 0 8px; font-size: 14px; font-weight: 600; }
    .row { display: flex; justify-content: space-between; align-items: center; margin: 6px 0; }
    .label { opacity: .7; }
    .toggle { position: relative; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; inset: 0; background: #48484a; border-radius: 11px; transition: .2s; }
    .slider:before { content: ""; position: absolute; width: 18px; height: 18px; left: 2px; bottom: 2px; background: #fff; border-radius: 50%; transition: .2s; }
    input:checked + .slider { background: #30d158; }
    input:checked + .slider:before { transform: translateX(18px); }
    .shortcut { font-size: 11px; opacity: .4; margin-top: 8px; text-align: center; }
  </style>
</head>
<body>
  <h3>🌐 Tooltip Translator</h3>
  <div class="row">
    <span class="label">פעיל</span>
    <label class="toggle">
      <input type="checkbox" id="enabled" checked>
      <span class="slider"></span>
    </label>
  </div>
  <div class="shortcut">Alt+T להפעלה/כיבוי</div>
  <script src="popup.js"></script>
</body>
</html>
